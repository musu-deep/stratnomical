name: Bootstrap project upload

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Unpack prepared project
        shell: bash
        run: |
          set -euo pipefail
          cat payload2/part-* > assembled-payload.b64
          base64 --decode assembled-payload.b64 > project.tar.xz
          rm -rf .bootstrap-extracted
          mkdir -p .bootstrap-extracted
          tar -xJf project.tar.xz -C .bootstrap-extracted
          shopt -s dotglob nullglob
          cp -a .bootstrap-extracted/stratnomical-github-ready/* .
          npm install --package-lock-only --ignore-scripts
          rm -rf .bootstrap-extracted payload payload2 assembled-payload.b64 project.tar.xz project-payload.b64

      - name: Commit project files
        shell: bash
        run: |
          set -euxo pipefail
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initial project upload"
          git push origin HEAD:main
